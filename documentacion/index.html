<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIS | Engineering Excellence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Capa 1: Header (Glassmorphism) -->
    <header class="navbar">
        <div class="logo">
            <img src="imagenes/Logo AXIS.png" alt="AXIS Logo" id="main-logo">
        </div>
        <nav>
            <ul>
                <li><a href="#performance">Performance</a></li>
                <li><a href="#lifestyle">Lifestyle</a></li>
                <li><a href="#limited">Limited Editions</a></li>
            </ul>
        </nav>
        <div class="cart-icon">
            <span>CART (0)</span>
        </div>
    </header>

    <main class="hero">
        <!-- Capa 2: Typography Background (Text behind the shoe) -->
        <div class="bg-text-container">
            <h1 class="bg-text">AXIS</h1>
        </div>

        <!-- Capa 3: Product Image (The Tech-Minimalist) -->
        <div class="product-container">
            <img src="imagenes/The Tech-Minimalist 1.png" alt="Axis Tech-Minimalist" class="hero-shoe">
            
            <!-- Capa 4: Interactive Hotspots -->
            <div class="hotspot" style="top: 40%; left: 30%;" data-info="Carbon Fiber Mesh"></div>
            <div class="hotspot" style="top: 75%; left: 60%;" data-info="Axis Gravity Sole"></div>
        </div>

        <!-- Capa 5: Foreground Information -->
        <section class="hero-info">
            <h2 class="title-main">GRAVITY ZERO.</h2>
            <p class="tagline">Engineered for the elite. Break your boundaries.</p>
            <button class="cta-button">EXPLORE AXIS</button>
        </section>

        <!-- Capa 6: Particles System -->
        <div id="particles-container"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
